version: "3.9"

services:
  backend-api:
    build:
      context: ./backend
      dockerfile: ../infra/docker/backend.Dockerfile
    command: /app/bin/api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - /tmp/mmo-media:/tmp/mmo-media

  backend-worker:
    build:
      context: ./backend
      dockerfile: ../infra/docker/backend.Dockerfile
    command: /app/bin/worker
    restart: unless-stopped
    env_file: .env
    volumes:
      - /tmp/mmo-media:/tmp/mmo-media

  backend-video-worker:
    build:
      context: ./backend
      dockerfile: ../infra/docker/ffmpeg.Dockerfile
    command: /app/bin/worker --video-only
    restart: unless-stopped
    env_file: .env
    volumes:
      - /tmp/mmo-media:/tmp/mmo-media

  frontend:
    build:
      context: ./frontend
      dockerfile: ../infra/docker/frontend.Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - backend-api

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-api
      - frontend