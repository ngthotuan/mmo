services:
  backend-api:
    image: ghcr.io/${IMAGE_OWNER:-ngthotuan}/mmo-backend-api:${APP_VERSION:-latest}
    build:
      context: ./backend
      dockerfile: ../infra/docker/backend.Dockerfile
      target: runtime-api
    command: /app/bin/api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - /tmp/mmo-media:/tmp/mmo-media
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend-worker:
    image: ghcr.io/${IMAGE_OWNER:-ngthotuan}/mmo-backend-api:${APP_VERSION:-latest}
    build:
      context: ./backend
      dockerfile: ../infra/docker/backend.Dockerfile
      target: runtime-api
    command: /app/bin/worker
    restart: unless-stopped
    env_file: .env
    volumes:
      - /tmp/mmo-media:/tmp/mmo-media
    depends_on:
      - backend-api

  backend-video-worker:
    image: ghcr.io/${IMAGE_OWNER:-ngthotuan}/mmo-backend-video-worker:${APP_VERSION:-latest}
    build:
      context: ./backend
      dockerfile: ../infra/docker/backend.Dockerfile
      target: runtime-video
    command: /app/bin/worker --video-only
    restart: unless-stopped
    env_file: .env
    volumes:
      - /tmp/mmo-media:/tmp/mmo-media
    depends_on:
      - backend-api

  frontend:
    image: ghcr.io/${IMAGE_OWNER:-ngthotuan}/mmo-frontend:${APP_VERSION:-latest}
    build:
      context: ./frontend
      dockerfile: ../infra/docker/frontend.Dockerfile
      args:
        # NEXT_PUBLIC_* is inlined at build time. The all-in-one stack serves the
        # app through nginx (:80), so the browser calls the API same-origin.
        # Override NEXT_PUBLIC_API_URL in .env for a real domain.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost}
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      backend-api:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend-api:
        condition: service_healthy
      frontend:
        condition: service_started
