app:
  env: "${APP_ENV:-development}"
  port: "${APP_PORT:-8080}"
  frontend_url: "${FRONTEND_URL:-http://localhost:3000}"

server:
  read_timeout: "15s"
  write_timeout: "60s"
  idle_timeout: "120s"
  shutdown_timeout: "30s"

db:
  url: "${DATABASE_URL}"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: "5m"
  ping_timeout: "5s"

redis:
  url: "${REDIS_URL}"
  ping_timeout: "5s"

auth:
  jwt_secret: "${JWT_SECRET}"
  encryption_key: "${ENCRYPTION_KEY}"
  access_token_ttl: "15m"
  refresh_token_ttl: "168h"

r2:
  account_id: "${R2_ACCOUNT_ID}"
  access_key_id: "${R2_ACCESS_KEY_ID}"
  secret_access_key: "${R2_SECRET_ACCESS_KEY}"
  bucket_name: "${R2_BUCKET_NAME:-mmo-media}"
  public_url: "${R2_PUBLIC_URL}"

queue:
  general_concurrency: 10
  video_concurrency: 2
  weights:
    critical: 6
    default: 3
    low: 1

ffmpeg:
  output_width: 1080
  output_height: 1920
  output_fps: 30
  output_crf: 23
  audio_bitrate: "128k"
  preset: "fast"
  temp_dir: ""

# AI script-generation provider selection.
#   provider:         gemini | mock   (mock = deterministic, no network — for hermetic E2E)
#   fallback_to_mock: when the primary provider errors (quota/outage), fall back to mock (logged)
ai:
  provider: "${AI_PROVIDER:-gemini}"
  fallback_to_mock: "${AI_FALLBACK_TO_MOCK:-true}"

gemini:
  api_key: "${GEMINI_API_KEY}"
  model: "${GEMINI_MODEL:-gemini-2.5-flash}"
  api_base: "https://generativelanguage.googleapis.com/v1beta/models"
  http_timeout: "60s"

tiktok:
  client_key: "${TIKTOK_CLIENT_KEY}"
  client_secret: "${TIKTOK_CLIENT_SECRET}"
  redirect_url: "${FRONTEND_URL:-http://localhost:3000}/channels/callback/tiktok"
  shop_api_key: "${TIKTOK_SHOP_API_KEY}"
  shop_api_secret: "${TIKTOK_SHOP_API_SECRET}"
  http_timeout: "15s"
  api:
    auth_base_url: "https://www.tiktok.com/v2/auth/authorize"
    token_url: "https://open.tiktokapis.com/v2/oauth/token"
    user_info_url: "https://open.tiktokapis.com/v2/user/info"
    publish_init_url: "https://open.tiktokapis.com/v2/post/publish/video/init/"
    publish_status_url: "https://open.tiktokapis.com/v2/post/publish/status/fetch/"
    video_query_url: "https://open.tiktokapis.com/v2/video/query/"
    shop_base_url: "https://open-api.tiktok-shops.com/api/v1"

facebook:
  app_id: "${FACEBOOK_APP_ID}"
  app_secret: "${FACEBOOK_APP_SECRET}"
  redirect_url: "${FRONTEND_URL:-http://localhost:3000}/channels/callback/facebook"
  http_timeout: "15s"
  api:
    version: "v20.0"
    auth_base_url: "https://www.facebook.com/v20.0/dialog/oauth"
    token_url: "https://graph.facebook.com/v20.0/oauth/access_token"
    graph_base_url: "https://graph.facebook.com/v20.0"

pexels:
  api_key: "${PEXELS_API_KEY}"
  api_base: "https://api.pexels.com"
  http_timeout: "15s"

pixabay:
  api_key: "${PIXABAY_API_KEY}"
  api_base: "https://pixabay.com/api"
  http_timeout: "15s"

youtube:
  api_key: "${YOUTUBE_API_KEY}"
  api_base: "https://www.googleapis.com/youtube/v3"
  http_timeout: "15s"

# YouTube Shorts PUBLISHING via Google OAuth2 (separate from the trending API key above).
# Leave client_id/secret empty for dry-run; set them to publish for real.
youtube_publish:
  client_id: "${YOUTUBE_OAUTH_CLIENT_ID:-}"
  client_secret: "${YOUTUBE_OAUTH_CLIENT_SECRET:-}"
  redirect_url: "${FRONTEND_URL:-http://localhost:3000}/channels/callback/youtube"
  default_category_id: "22"
  privacy_status: "${YOUTUBE_PRIVACY_STATUS:-unlisted}"
  http_timeout: "120s"
  api:
    auth_base_url: "https://accounts.google.com/o/oauth2/v2/auth"
    token_url: "https://oauth2.googleapis.com/token"
    data_base_url: "https://www.googleapis.com/youtube/v3"
    upload_base_url: "https://www.googleapis.com/upload/youtube/v3"

reddit:
  api_base: "https://www.reddit.com"
  http_timeout: "15s"

google_trends:
  api_base: "https://trends.google.com/trends/api/dailytrends"
  http_timeout: "15s"

edgetts:
  default_voice: "vi-VN-HoaiMyNeural"
  voices:
    en_female: "en-US-AriaNeural"
    en_male: "en-US-GuyNeural"
    vi_female: "vi-VN-HoaiMyNeural"
    vi_male: "vi-VN-NamMinhNeural"

content:
  language: "vi"
  geo: "VN"

schedule:
  check_publish: "* * * * *"
  discover_trends: "0 */6 * * *"
  sync_analytics: "0 2 * * *"
  refresh_tokens: "0 */12 * * *"
  auto_pilot_tick: "*/15 * * * *"
  retry_publish: "*/5 * * * *"

channel:
  facebook_token_expiry: "1320h"

publish:
  min_schedule_before_now: "30s"
  # dry_run: when "true", ALL publishes are mocked (no real social API calls).
  # Use for hermetic end-to-end tests. Per-channel dry_run flag also works.
  dry_run: "${PUBLISH_DRY_RUN:-false}"
  max_retry_attempts: 5

auto_pilot:
  tick_batch_size: 200

video:
  presigned_url_ttl: "1h"
  target_duration_secs: 360
  max_clips: 15

media_collect:
  http_timeout: "60s"
  assets_per_search: 15
