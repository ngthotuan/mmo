name: Release

# Triggered when a SemVer tag is pushed (e.g. v1.2.3).
on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  # ── Build & push Docker images ─────────────────────────────────────────────
  docker:
    name: Build & push ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        image:
          - name: backend-api
            context: ./backend
            file: ./infra/docker/backend.Dockerfile
            target: runtime-api
          - name: backend-video-worker
            context: ./backend
            file: ./infra/docker/backend.Dockerfile
            target: runtime-video
          - name: frontend
            context: ./frontend
            file: ./infra/docker/frontend.Dockerfile
            target: ""
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mmo-${{ matrix.image.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.file }}
          target: ${{ matrix.image.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max

  # ── Deploy to production (gated by manual approval) ────────────────────────
  deploy:
    name: Deploy to production
    needs: docker
    runs-on: ubuntu-latest
    environment: production   # requires approval — set up under repo Settings
    steps:
      - uses: actions/checkout@v4

      - name: Compute deploy version
        id: ver
        run: |
          TAG="${{ github.ref_name }}"   # e.g. v1.2.3
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"  # → 1.2.3

      # Ship the compose file + nginx config to the server. The deploy dir is NOT
      # a git checkout, so we copy these from the runner (which IS checked out at
      # the released tag) instead of running git on the server.
      - name: Copy compose + nginx config to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "docker-compose.yml,infra/nginx/nginx.conf"
          target: ${{ secrets.DEPLOY_PATH }}
          overwrite: true

      - name: SSH deploy + migrate + health check + rollback
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: NEW_VERSION,IMAGE_OWNER
          command_timeout: 10m
          script_stop: true
          script: |
            set -euo pipefail

            cd "${{ secrets.DEPLOY_PATH }}"

            # ── 1. Snapshot current version for rollback ──────────────────
            PREV_VERSION=$(grep '^APP_VERSION=' .env 2>/dev/null | cut -d'=' -f2 || echo "latest")
            echo "Previous version: $PREV_VERSION"
            echo "Deploying version: $NEW_VERSION"

            # ── 2. Update version in .env ─────────────────────────────────
            grep -v '^APP_VERSION=' .env > .env.tmp || true
            mv .env.tmp .env
            echo "APP_VERSION=$NEW_VERSION" >> .env
            echo "IMAGE_OWNER=$IMAGE_OWNER" >> .env

            # ── 3. Pull new images ────────────────────────────────────────
            # (docker-compose.yml + infra/nginx/nginx.conf were just copied here
            #  by the scp step, so no git is needed on the server.)
            docker compose pull

            # ── 4. Run goose migration BEFORE swapping containers ─────────
            # Uses the NEW image so any new migration files are included.
            # DATABASE_URL comes from the container's env_file (.env); it must be
            # expanded INSIDE the container, hence the single-quoted sh -c.
            docker compose run --rm --no-deps backend-api \
              sh -c '/app/bin/goose -dir /app/migrations postgres "$DATABASE_URL" up'

            # ── 5. Swap containers ────────────────────────────────────────
            docker compose up -d

            # ── 6. Health check (30s window) ──────────────────────────────
            for i in $(seq 1 15); do
              if curl -fsS http://localhost:8080/health > /dev/null; then
                echo "Health check passed ($i)"
                docker image prune -f
                exit 0
              fi
              echo "Waiting for health... ($i/15)"
              sleep 2
            done

            # ── 7. Rollback on health failure ─────────────────────────────
            echo "Health check FAILED — rolling back to $PREV_VERSION"
            grep -v '^APP_VERSION=' .env > .env.tmp
            mv .env.tmp .env
            echo "APP_VERSION=$PREV_VERSION" >> .env
            docker compose up -d
            exit 1
        env:
          NEW_VERSION: ${{ steps.ver.outputs.version }}
          IMAGE_OWNER: ${{ github.repository_owner }}

  # ── Cleanup old GHCR images (keep latest 5) ────────────────────────────────
  cleanup:
    name: Cleanup old images (${{ matrix.package }})
    needs: deploy
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - mmo-backend-api
          - mmo-backend-video-worker
          - mmo-frontend
    steps:
      - name: Delete old versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ matrix.package }}
          package-type: container
          min-versions-to-keep: 5
          delete-only-untagged-versions: "false"
